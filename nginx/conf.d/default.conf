# Cache zone — 512MB on disk, 20MB key store, purge inactive after 10 min
proxy_cache_path /var/cache/nginx
                 levels=1:2
                 keys_zone=app:20m
                 max_size=512m
                 inactive=10m
                 use_temp_path=off;

server {
    listen 80;
    server_name _;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml font/woff2;

    # ── Next.js static assets — long-lived, immutable ─────────────────────────
    # These files have content-hash in the filename, safe to cache 1 year.
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_cache app;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache $upstream_cache_status;
    }

    # ── Payload media uploads — cache 24h ─────────────────────────────────────
    location /media/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_cache app;
        proxy_cache_valid 200 24h;
        proxy_cache_use_stale error timeout updating;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
        add_header X-Cache $upstream_cache_status;
    }

    # ── Payload admin + API — never cache ────────────────────────────────────
    location ~ ^/(admin|api)/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        add_header Cache-Control "no-store";
    }

    # ── Frontend pages — pass through to Next.js, no nginx HTML cache ────────
    # Next.js ISR handles page caching internally (revalidateTag works correctly).
    # nginx HTML caching would create a second cache layer that can't be purged
    # on-demand and would serve stale content after Payload revalidation hooks fire.
    # Cloudflare (when added) will handle edge caching for anonymous users.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }
}
