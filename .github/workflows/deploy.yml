name: Deploy Monorepo

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-monorepo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 << 'EOF'
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo CONNECTED"

      - name: Deploy repo
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e

          mkdir -p /var/www/app
          cd /var/www/app

          if [ ! -d .git ]; then
            rm -rf ./* ./.??* 2>/dev/null || true
            GIT_SSH_COMMAND="ssh -i ~/.ssh/monorepo_deploy -o IdentitiesOnly=yes" \
              git clone git@github.com:pakisans/palisade-mono.git .
          else
            GIT_SSH_COMMAND="ssh -i ~/.ssh/monorepo_deploy -o IdentitiesOnly=yes" \
              git fetch origin
            git reset --hard origin/main
          fi
          EOF

      - name: Ensure backend media directory exists
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /var/www/app/backend/public/media"

      - name: Write root build ENV
        shell: bash
        run: |
          {
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=appdb"
            echo "DATABASE_URL_BUILD=${{ secrets.DATABASE_URL_BUILD }}"
            echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}"
            echo "PREVIEW_SECRET=${{ secrets.PREVIEW_SECRET }}"
            echo "REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}"
            echo "PAYLOAD_PUBLIC_SERVER_URL=${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
            echo "NEXT_PUBLIC_SERVER_URL=${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
            echo "STRIPE_WEBHOOKS_SIGNING_SECRET=${{ secrets.STRIPE_WEBHOOKS_SIGNING_SECRET }}"
            echo "PAYLOAD_URL_BUILD=http://127.0.0.1:3001"
            echo "NEXT_PUBLIC_PAYLOAD_URL=${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
          } | ssh -i ~/.ssh/id_ed25519 \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat > /var/www/app/.env"

      - name: Write backend runtime ENV
        shell: bash
        run: |
          {
            echo "DATABASE_URL=postgresql://appuser:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/appdb"
            echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}"
            echo "PREVIEW_SECRET=${{ secrets.PREVIEW_SECRET }}"
            echo "PAYLOAD_PUBLIC_SERVER_URL=${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
            echo "NEXT_PUBLIC_SERVER_URL=${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
            echo "STRIPE_WEBHOOKS_SIGNING_SECRET=${{ secrets.STRIPE_WEBHOOKS_SIGNING_SECRET }}"
          } | ssh -i ~/.ssh/id_ed25519 \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat > /var/www/app/backend/.env"

      - name: Write frontend runtime ENV
        shell: bash
        run: |
          {
            echo "PAYLOAD_URL=http://app1:3000"
            echo "NEXT_PUBLIC_PAYLOAD_URL=${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}"
            echo "NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}"
            echo "REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}"
          } | ssh -i ~/.ssh/id_ed25519 \
              -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat > /var/www/app/frontend/.env"

      - name: Ensure postgres is running
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app
          docker compose up -d postgres
          echo "Waiting for postgres to become ready..."
          until docker compose exec -T postgres pg_isready -U appuser -d appdb; do
            sleep 2
          done
          echo "Postgres is ready."
          EOF

      - name: Bootstrap backend migrations before build
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
          set -e
          cd /var/www/app

          docker compose up -d postgres

          until docker compose exec -T postgres pg_isready -U appuser -d appdb; do
            sleep 2
          done

          docker run --rm --network host \
            -v /var/www/app/backend:/app \
            -w /app \
            -e DATABASE_URL="postgresql://appuser:${{ secrets.POSTGRES_PASSWORD }}@127.0.0.1:5432/appdb" \
            -e PAYLOAD_SECRET="${{ secrets.PAYLOAD_SECRET }}" \
            -e PREVIEW_SECRET="${{ secrets.PREVIEW_SECRET }}" \
            -e PAYLOAD_PUBLIC_SERVER_URL="${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}" \
            -e NEXT_PUBLIC_SERVER_URL="${{ secrets.PAYLOAD_PUBLIC_SERVER_URL }}" \
            node:20-alpine sh -lc "
              apk add --no-cache libc6-compat
              corepack enable
              pnpm install --frozen-lockfile
              yes | pnpm payload migrate
            "
          EOF

      - name: Rebuild and restart backend
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app
          docker compose up -d --build --no-deps app1
          EOF

      - name: Run backend migrations
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app

          echo "Waiting for app1 to be running..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Status}}' app1 2>/dev/null || echo "missing")
            if [ "$STATUS" = "running" ]; then
              echo "app1 is running."
              break
            fi
            echo "app1 status: $STATUS (attempt $i/30)"
            sleep 5
          done

          if [ "$STATUS" != "running" ]; then
            echo "ERROR: app1 did not start"
            docker logs --tail 100 app1 || true
            exit 1
          fi

          yes | docker compose exec -T app1 node_modules/.bin/payload migrate || true
          EOF

      - name: Rebuild and restart frontend
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app
          docker compose build app2
          docker compose up -d --no-deps app2
          EOF

      - name: Ensure nginx is running
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app
          docker compose up -d nginx
          docker compose restart nginx
          EOF
