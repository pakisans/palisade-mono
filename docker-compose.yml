services:
  postgres:
    image: postgres:16-alpine
    container_name: palisade_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: palisade
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    networks:
      - app_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appuser -d palisade']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
      extra_hosts:
        - 'host.docker.internal:host-gateway'
      args:
        DATABASE_URL_BUILD: ${DATABASE_URL_BUILD}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
        PREVIEW_SECRET: ${PREVIEW_SECRET}
        PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
        NEXT_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
        STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        STRIPE_WEBHOOKS_SIGNING_SECRET: ${STRIPE_WEBHOOKS_SIGNING_SECRET}
    container_name: palisade_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      FRONTEND_INTERNAL_URL: http://frontend:3000
    ports:
      - '3001:3000'
    volumes:
      - /var/www/palisade-media:/app/public/media
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PAYLOAD_URL: ${PAYLOAD_URL_BUILD}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        REVALIDATE_SECRET: ${REVALIDATE_SECRET}
        NEXT_PUBLIC_PAYLOAD_URL: ${NEXT_PUBLIC_PAYLOAD_URL}
    container_name: palisade_frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    networks:
      - app_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: palisade_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - app_network
    depends_on:
      - frontend

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  nginx_cache:
